<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SITTA UT</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <main class="login-container">
        <img src="img/logo_ut.jpg" alt="Logo Universitas Terbuka" class="logo-ut" width="100px" height="120px">
        <h2 class="welcome-text">Selamat Datang di SITTA</h2>
        <h4>Sistem Informasi Pemesanan Bahan Ajar</h4>
        <form id="login-form" aria-label="Formulir Masuk Aplikasi SITTA">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required placeholder="email@ut.ac.id">
            
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required placeholder="password">
            
            <button type="submit" id="login-button">Masuk</button>
        </form>

        <p><button class="link-button" id="forgot-password-btn">Lupa password?</button></p>
        <p>Belum punya akun? <button class="link-button" id="register-btn">Daftar</button></p>
    </main>

    <div id="forgot-modal" class="modal" role="dialog" aria-modal="true" aria-labelledby="forgot-modal-title">
        <div class="modal-content">
            <span class="close-btn" data-modal="forgot-modal">&times;</span>
            <h3 id="forgot-modal-title">Lupa Password</h3>
            <p>Silakan hubungi Administrator SITTA untuk reset password.</p>
        </div>
    </div>

    <div id="register-modal" class="modal" role="dialog" aria-modal="true" aria-labelledby="register-modal-title">
        <div class="modal-content">
            <span class="close-btn" data-modal="register-modal">&times;</span>
            <h3 id="register-modal-title">Pendaftaran Akun</h3>
            <p>Pendaftaran akun hanya dapat dilakukan oleh Administrator SITTA.</p>
        </div>
    </div>

<div class="footer">
  <p>Dibuat Oleh Ritna Wawan - 052814946</p>
</div>
    <script src="js/data.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
